<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davo Form Guide</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f6f8;
    --panel: #ffffff;
    --text: #1a1d23;
    --muted: #5b6270;
    --border: #dde1e7;
    --accent: #1f6feb;
    --rank-top: #fff4d6;
    --rank-top-border: #e8b923;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --panel: #1d2025;
      --text: #e8eaed;
      --muted: #9aa2af;
      --border: #30343b;
      --accent: #5b9bff;
      --rank-top: #3a3320;
      --rank-top-border: #8a6d1a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  h2 { font-size: 1.15rem; margin: 24px 0 8px; }
  h3 { font-size: 1rem; margin: 16px 0 6px; color: var(--muted); }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .status { color: var(--muted); font-size: 0.85rem; margin-top: 8px; }
  .meeting-date-banner {
    margin: 10px 0 2px;
  }
  table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 0.86rem; }
  th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.02em; }
  tr.top-rank { background: var(--rank-top); }
  tr.top-rank td:first-child { border-left: 3px solid var(--rank-top-border); }
  .meeting-block { margin-bottom: 22px; }
  .meeting-block > summary {
    font-size: 1.15rem;
    font-weight: 600;
    margin: 24px 0 8px;
    cursor: pointer;
    list-style: revert;
  }
  .meeting-block > summary:hover { color: var(--accent); }
  .race-block { margin-bottom: 10px; overflow-x: auto; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
  .gear-changes { color: var(--muted); font-size: 0.78rem; font-style: italic; margin: -6px 0 12px; }
  .alert-emoji { font-size: 0.85em; }
</style>
</head>
<body>

<h1>Davo's Form Guide <span id="alertBanner"></span></h1>

<div class="panel">
  <div class="status" id="mainStatus"></div>
  <div id="mainResults"></div>
</div>

<script>
const SUPABASE_URL = "https://wflrrqvqesosdfhsyqch.supabase.co";
// Public anon key — read-only SELECT on davo_option_1_form_guide_v1 only.
// No service-role key or other secret is used here.
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmbHJycXZxZXNvc2RmaHN5cWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTcxNzUsImV4cCI6MjA5NzAzMzE3NX0.64ds3plmFs07x6d62mzGfeCPPARyEF-JqQiLoORrIqM";
const PAGE_SIZE = 1000;

const MAIN_SELECT = [
  "meeting_date","bf_meeting_name","race_number","market_name","event_name",
  "davo_rank","win_probability","horse_name","jockey","trainer","barrier",
  "weight","weight_allocated","tab_no","price_sp","gear_changes"
].join(",");

function formatNiceDate(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  const dayName = date.toLocaleDateString("en-AU", { weekday: "long" });
  const monthName = date.toLocaleDateString("en-AU", { month: "long" });
  const suffix = (d % 10 === 1 && d !== 11) ? "st"
    : (d % 10 === 2 && d !== 12) ? "nd"
    : (d % 10 === 3 && d !== 13) ? "rd"
    : "th";
  return `${dayName} ${d}${suffix} of ${monthName}, ${y}`;
}

function stripLeadingRaceLabel(name) {
  return name.replace(/^R\d+\s*/i, "");
}

async function fetchAllPages(url) {
  let allRows = [];
  let offset = 0;
  while (true) {
    const resp = await fetch(url, {
      headers: {
        apikey: ANON_KEY,
        Authorization: `Bearer ${ANON_KEY}`,
        "Range-Unit": "items",
        Range: `${offset}-${offset + PAGE_SIZE - 1}`
      }
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const page = await resp.json();
    allRows = allRows.concat(page);
    if (page.length < PAGE_SIZE) break;
    offset += PAGE_SIZE;
  }
  return allRows;
}

function fmtWeight(row) {
  const w = row.weight ?? row.weight_allocated;
  return (w === null || w === undefined || w === "") ? "" : w;
}

function fmtProb(p) {
  if (p === null || p === undefined) return "";
  return (p * 100).toFixed(1) + "%";
}

function groupBy(rows, keyFn) {
  const map = new Map();
  for (const r of rows) {
    const k = keyFn(r);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(r);
  }
  return map;
}

function renderGrouped(container, rows, meetingKeyField, meetingLabelFn) {
  container.innerHTML = "";
  if (!rows.length) {
    container.innerHTML = '<div class="empty">No rows returned.</div>';
    return;
  }

  const meetingDates = [...new Set(rows.map(r => r.meeting_date))];
  const banner = document.createElement("div");
  banner.className = "meeting-date-banner";
  banner.textContent = meetingDates.map(formatNiceDate).join(", ");
  container.appendChild(banner);

  const meetings = groupBy(rows, r => r[meetingKeyField] || "Unknown meeting");
  const sortedMeetingKeys = [...meetings.keys()].sort();

  for (const meetingKey of sortedMeetingKeys) {
    const meetingRows = meetings.get(meetingKey);
    const meetingBlock = document.createElement("details");
    meetingBlock.className = "meeting-block";

    const races = groupBy(meetingRows, r => r.race_number ?? "?");
    const sortedRaceNumbers = [...races.keys()].sort((a, b) => Number(a) - Number(b));

    const summary = document.createElement("summary");
    const raceCount = sortedRaceNumbers.length;
    summary.textContent = meetingLabelFn(meetingKey, meetingRows)
      + ` (${raceCount} race${raceCount === 1 ? "" : "s"})`;
    meetingBlock.appendChild(summary);

    for (const raceNumber of sortedRaceNumbers) {
      const raceRows = races.get(raceNumber).slice().sort((a, b) => {
        const ra = a.davo_rank ?? 9999, rb = b.davo_rank ?? 9999;
        return ra - rb;
      });
      const rawRaceName = raceRows[0].market_name || raceRows[0].event_name || "";
      const raceName = stripLeadingRaceLabel(rawRaceName);

      const raceBlock = document.createElement("div");
      raceBlock.className = "race-block";
      const h3 = document.createElement("h3");
      h3.textContent = "Race " + raceNumber + (raceName ? " — " + raceName : "");
      raceBlock.appendChild(h3);

      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>Rank</th><th>Horse</th><th>Barrier</th><th>Weight</th>
            <th>Jockey</th><th>Trainer</th><th>$W</th><th>Win %</th>
          </tr>
        </thead>`;
      const tbody = document.createElement("tbody");
      for (const r of raceRows) {
        const tr = document.createElement("tr");
        if (r.davo_rank !== null && r.davo_rank !== undefined && r.davo_rank <= 4) {
          tr.className = "top-rank";
        }
        tr.innerHTML = `
          <td>${r.davo_rank ?? ""}</td>
          <td>${r.horse_name ?? ""}</td>
          <td>${r.barrier ?? ""}</td>
          <td>${fmtWeight(r)}</td>
          <td>${r.jockey ?? ""}</td>
          <td>${r.trainer ?? ""}</td>
          <td>${r.price_sp ?? ""}</td>
          <td>${fmtProb(r.win_probability)}</td>`;
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      raceBlock.appendChild(table);

      const gearNotes = raceRows
        .filter(r => r.gear_changes && String(r.gear_changes).trim())
        .map(r => `${r.horse_name ?? ""} — ${String(r.gear_changes).trim()}`);
      if (gearNotes.length) {
        const gearEl = document.createElement("div");
        gearEl.className = "gear-changes";
        gearEl.textContent = "Gear changes: " + gearNotes.join("; ");
        raceBlock.appendChild(gearEl);
      }

      meetingBlock.appendChild(raceBlock);
    }
    container.appendChild(meetingBlock);
  }
}

async function fetchMain(date) {
  const statusEl = document.getElementById("mainStatus");
  const resultsEl = document.getElementById("mainResults");
  const url = `${SUPABASE_URL}/rest/v1/davo_option_1_form_guide_v1`
    + `?select=${MAIN_SELECT}&meeting_date=eq.${date}`
    + `&order=bf_meeting_name.asc,race_number.asc,davo_rank.asc`;
  try {
    const rows = await fetchAllPages(url);
    renderGrouped(resultsEl, rows, "bf_meeting_name", (key) => key);
  } catch (err) {
    statusEl.textContent = "Error: " + err.message;
    resultsEl.innerHTML = "";
  }
  renderAutomationHealthEmoji(date);
}

function todayDateString() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

async function renderAutomationHealthEmoji(date) {
  const el = document.getElementById("alertBanner");
  el.innerHTML = "";
  const span = document.createElement("span");
  span.className = "alert-emoji";
  // "Good" means the automated pipeline actually ran correctly for this
  // specific date -- Option 1 promoted, and PF discovery ran and fully
  // drained for this date (not just a high match rate against stale PF
  // rows from a previous day, which the locked matching rule wouldn't
  // otherwise distinguish).
  try {
    const resp = await fetch(
      `${SUPABASE_URL}/rest/v1/davo_option_1_automation_health_v1?meeting_date=eq.${date}`,
      { headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` } }
    );
    if (!resp.ok) { span.textContent = "👎"; el.appendChild(span); return; }
    const rows = await resp.json();
    const h = rows[0];
    const isGood = !!(h && h.promotion_ok && h.pf_discovery_ran && h.pf_fully_drained);
    span.textContent = isGood ? "👍" : "👎";
  } catch (err) {
    span.textContent = "👎";
  }
  el.appendChild(span);
}

fetchMain(todayDateString());
</script>

</body>
</html>
